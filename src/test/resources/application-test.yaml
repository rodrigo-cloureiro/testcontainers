spring:
  datasource:
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: create-drop

    show-sql: true

    properties:
      hibernate:
        format_sql: true

  sql:
    init:
      mode: never

  cache:
    type: redis

  data:
    redis:
      host: localhost
      port: 6379
      ttl: 30
